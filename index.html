<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Primordia — particle universes</title>
<style>
  :root {
    --bg: #05070c;
    --panel: rgba(13, 17, 27, 0.82);
    --ink: #cdd6e4;
    --dim: #6b7689;
    --accent: #7fd4a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: "SF Mono", ui-monospace, Menlo, monospace; color: var(--ink); }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

  #hud {
    position: fixed; top: 14px; left: 14px;
    background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
    padding: 12px 14px; font-size: 12px; line-height: 1.7;
    user-select: none; max-width: 300px;
  }
  #hud h1 { font-size: 13px; letter-spacing: 3px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
  #hud .sub { color: var(--dim); font-size: 10.5px; margin-bottom: 8px; }
  #seedName { font-size: 15px; letter-spacing: 1px; color: #fff; }
  #laws { color: var(--dim); font-size: 11px; }
  .controls { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  button, input {
    font: inherit; font-size: 11px; color: var(--ink);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; padding: 5px 9px; cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.14); }
  input { width: 130px; cursor: text; }
  input:focus { outline: 1px solid var(--accent); }
  #hint { margin-top: 8px; color: var(--dim); font-size: 10px; }
  #hud.min > :not(h1) { display: none; }
  #hud h1 { cursor: pointer; }

  #safari {
    position: fixed; top: 14px; right: 14px;
    background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
    padding: 12px 14px; font-size: 12px; line-height: 1.5;
    user-select: none; width: 300px; display: none;
  }
  #safari.open { display: block; }
  #safari h2 { font-size: 12px; letter-spacing: 3px; color: var(--accent); margin-bottom: 6px; }
  #instruments { color: var(--dim); font-size: 11px; margin-bottom: 6px; min-height: 15px; }
  #bounties { list-style: none; }
  #bounties li { padding: 6px 0; border-top: 1px solid rgba(255,255,255,0.06); }
  #bounties .t { color: var(--ink); }
  #bounties li.found .t { color: var(--accent); }
  #bounties .d { color: var(--dim); font-size: 10.5px; }
  #safari .note { margin-top: 8px; color: var(--dim); font-size: 10px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <h1 title="click to collapse/expand">PRIMORDIA</h1>
  <div class="sub">simple rules, unexpected life</div>
  <div id="seedName">—</div>
  <div id="laws">—</div>
  <div class="controls">
    <button id="btnNew">new universe</button>
    <button id="btnRestart">big bang ↺</button>
    <button id="btnPause">pause</button>
    <button id="btnSafari">safari</button>
  </div>
  <div class="controls">
    <input id="seedInput" placeholder="seed…" spellcheck="false">
    <button id="btnGo">go</button>
  </div>
  <div id="hint">drag to perturb · space = pause · n = new · s = safari<br>the seed lives in the URL: share it</div>
</div>

<div id="safari">
  <h2>EXPEDITIONS</h2>
  <div id="instruments">instruments warming up…</div>
  <ul id="bounties"></ul>
  <div class="note">readings every 60 frames · perturbed runs don't count —
  big bang ↺ to reset · progress stays in your browser</div>
</div>

<script>
"use strict";

/* ---------- Deterministic PRNG: every seed is a reproducible universe ---------- */

function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}

function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* Pronounceable names: the name IS the seed */
const CONS = "KLMNRSTVZBDGF", VOWS = "AEIOU";
function randomSeedName() {
  let s = "";
  for (let w = 0; w < 2; w++) {
    if (w) s += "-";
    const syl = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < syl; i++) {
      s += CONS[Math.floor(Math.random() * CONS.length)];
      s += VOWS[Math.floor(Math.random() * VOWS.length)];
    }
  }
  return s;
}

/* ---------- Universe: physical laws derived from the seed ---------- */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

let U = null;      // the current universe
let paused = false;

function makeUniverse(seedName) {
  const rand = mulberry32(fnv1a(seedName));

  const nSpecies = 4 + Math.floor(rand() * 4);            // 4..7 species
  const rMax = 60 + rand() * 50;                          // interaction radius (px)
  const beta = 0.22 + rand() * 0.12;                      // close-range repulsion zone
  const frictionHalfLife = 0.035 + rand() * 0.02;         // seconds
  const forceFactor = 700 + rand() * 600;

  // Asymmetric matrix: how much species i is attracted (+) or repelled (-) by species j.
  const matrix = [];
  for (let i = 0; i < nSpecies; i++) {
    matrix.push([]);
    for (let j = 0; j < nSpecies; j++) matrix[i].push(rand() * 2 - 1);
  }

  const hue0 = rand() * 360;
  const colors = [];
  for (let i = 0; i < nSpecies; i++) {
    colors.push(`hsl(${(hue0 + i * 137.5) % 360} 85% 62%)`);
  }

  const n = Math.max(400, Math.min(1100, Math.round((W * H) / 1400)));
  const px = new Float32Array(n), py = new Float32Array(n);
  const vx = new Float32Array(n), vy = new Float32Array(n);
  const sp = new Uint8Array(n);
  for (let i = 0; i < n; i++) {
    px[i] = rand() * W; py[i] = rand() * H;
    sp[i] = Math.floor(rand() * nSpecies);
  }

  return { seedName, nSpecies, rMax, beta, frictionHalfLife, forceFactor,
           matrix, colors, n, px, py, vx, vy, sp };
}

/* ---------- Physics ---------- */

// Classic Particle Life force profile (u = distance normalized by rMax):
// hard repulsion below beta, then an attraction/repulsion "tent" weighted by a.
function force(u, a, beta) {
  if (u < beta) return u / beta - 1;
  if (u < 1) return a * (1 - Math.abs(2 * u - 1 - beta) / (1 - beta));
  return 0;
}

const pointer = { x: 0, y: 0, active: false };

function step(dt) {
  const { n, px, py, vx, vy, sp, matrix, rMax, beta, forceFactor } = U;
  const friction = Math.pow(0.5, dt / U.frictionHalfLife);

  // Uniform spatial grid: only the 9 neighboring cells, not O(n²).
  const cell = rMax;
  const gw = Math.max(1, Math.ceil(W / cell));
  const gh = Math.max(1, Math.ceil(H / cell));
  const heads = new Int32Array(gw * gh).fill(-1);
  const next = new Int32Array(n);
  for (let i = 0; i < n; i++) {
    const cx = Math.min(gw - 1, Math.max(0, Math.floor(px[i] / cell)));
    const cy = Math.min(gh - 1, Math.max(0, Math.floor(py[i] / cell)));
    const c = cy * gw + cx;
    next[i] = heads[c]; heads[c] = i;
  }

  for (let i = 0; i < n; i++) {
    let fx = 0, fy = 0;
    const mi = matrix[sp[i]];
    const cx = Math.floor(px[i] / cell), cy = Math.floor(py[i] / cell);

    for (let oy = -1; oy <= 1; oy++) {
      const gy = ((cy + oy) % gh + gh) % gh;
      for (let ox = -1; ox <= 1; ox++) {
        const gx = ((cx + ox) % gw + gw) % gw;
        for (let j = heads[gy * gw + gx]; j !== -1; j = next[j]) {
          if (j === i) continue;
          // Toroidal topology: the world wraps around onto itself.
          let dx = px[j] - px[i]; dx -= W * Math.round(dx / W);
          let dy = py[j] - py[i]; dy -= H * Math.round(dy / H);
          const d2 = dx * dx + dy * dy;
          if (d2 === 0 || d2 > rMax * rMax) continue;
          const d = Math.sqrt(d2);
          const f = force(d / rMax, mi[sp[j]], beta);
          fx += (dx / d) * f; fy += (dy / d) * f;
        }
      }
    }

    if (pointer.active) {
      let dx = px[i] - pointer.x, dy = py[i] - pointer.y;
      dx -= W * Math.round(dx / W); dy -= H * Math.round(dy / H);
      const d2 = dx * dx + dy * dy, r = 130;
      if (d2 < r * r && d2 > 0.01) {
        const d = Math.sqrt(d2);
        const push = (1 - d / r) * 2.5;   // same scale as inter-species forces (~[-1,1])
        fx += (dx / d) * push;
        fy += (dy / d) * push;
      }
    }

    vx[i] = vx[i] * friction + fx * forceFactor * dt;
    vy[i] = vy[i] * friction + fy * forceFactor * dt;
  }

  for (let i = 0; i < n; i++) {
    px[i] = (px[i] + vx[i] * dt + W) % W;
    py[i] = (py[i] + vy[i] * dt + H) % H;
  }
}

/* ---------- Rendering ---------- */

function draw() {
  ctx.fillStyle = "rgba(5, 7, 12, 0.24)";   // trails: the past fades slowly
  ctx.fillRect(0, 0, W, H);
  const { n, px, py, sp, colors } = U;
  for (let s = 0; s < colors.length; s++) {
    ctx.fillStyle = colors[s];
    for (let i = 0; i < n; i++) {
      if (sp[i] !== s) continue;
      ctx.fillRect(px[i] - 1, py[i] - 1, 2.2, 2.2);
    }
  }
}

let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.033);
  last = now;
  if (!paused) { step(dt); draw(); safariTick(); }
  requestAnimationFrame(loop);
}

/* ---------- Safari: naturalist mode ---------- */
// Expedition bounties, verified by onboard instruments — never self-certified.
// A run touched by the pointer is marked perturbed and cannot score bounties.

let safariActive = false;
let run = null;              // per-universe expedition state, reset by boot()

let storage = null;
try { storage = window.localStorage || null; } catch (e) { storage = null; }
let progress = {};
try { progress = JSON.parse((storage && storage.getItem("primordia.safari.progress")) || "{}"); }
catch (e) { progress = {}; }
function saveProgress() {
  try { storage && storage.setItem("primordia.safari.progress", JSON.stringify(progress)); }
  catch (e) { /* private browsing: progress lives for this session only */ }
}

function newRun() {
  return { frames: 0, samples: [], peakSpeed: 0, perturbed: false };
}

// True if pred holds for the last n consecutive samples.
function sustained(n, pred) {
  const s = run.samples;
  if (s.length < n) return false;
  for (let i = s.length - n; i < s.length; i++) if (!pred(s[i])) return false;
  return true;
}

// Thresholds calibrated on real universes (see FIELD-NOTES.md):
// KUKO-NETI peaks at ~49 px/s then settles below 3 px/s around frame 1000.
const BOUNTIES = [
  { id: "absolute-zero", title: "Absolute zero",
    desc: "A universe that lived, then froze completely.",
    test: () => run.peakSpeed > 20 && sustained(5, s => s.speed < 3) },
  { id: "stampede", title: "Perpetual stampede",
    desc: "Mean speed above 400 px/s for ten straight readings.",
    test: () => sustained(10, s => s.speed > 400) },
  { id: "metropolis", title: "Metropolis",
    desc: "Clustering above 35: few, enormous gatherings.",
    test: () => sustained(3, s => s.clustering > 35) },
  { id: "drifting-fog", title: "Drifting fog",
    desc: "Almost no structure (clustering < 2.5), yet still drifting.",
    test: () => sustained(5, s => s.clustering < 2.5 && s.speed >= 10 && s.speed <= 120) },
  { id: "crowded-ark", title: "Crowded ark",
    desc: "Seven species, and still an organized world.",
    test: () => U.nSpecies === 7 && sustained(3, s => s.clustering > 15) },
];

// Same definition as test/explore.mjs: variance/mean of neighbor counts
// within 25px, computed with a coarse grid instead of O(n²).
function computeMetrics() {
  const { n, px, py, vx, vy } = U;
  let speed = 0;
  for (let i = 0; i < n; i++) speed += Math.hypot(vx[i], vy[i]);
  speed /= n;

  const R = 25, R2 = R * R;
  const gw = Math.max(1, Math.ceil(W / R)), gh = Math.max(1, Math.ceil(H / R));
  const heads = new Int32Array(gw * gh).fill(-1), next = new Int32Array(n);
  for (let i = 0; i < n; i++) {
    const cx = Math.min(gw - 1, Math.max(0, Math.floor(px[i] / R)));
    const cy = Math.min(gh - 1, Math.max(0, Math.floor(py[i] / R)));
    const c = cy * gw + cx;
    next[i] = heads[c]; heads[c] = i;
  }
  let mean = 0, m2 = 0, count = 0;
  for (let i = 0; i < n; i++) {
    const cx = Math.floor(px[i] / R), cy = Math.floor(py[i] / R);
    let cnt = 0;
    for (let oy = -1; oy <= 1; oy++) {
      const gy = ((cy + oy) % gh + gh) % gh;
      for (let ox = -1; ox <= 1; ox++) {
        const gx = ((cx + ox) % gw + gw) % gw;
        for (let j = heads[gy * gw + gx]; j !== -1; j = next[j]) {
          if (j === i) continue;
          let dx = px[j] - px[i]; dx -= W * Math.round(dx / W);
          let dy = py[j] - py[i]; dy -= H * Math.round(dy / H);
          if (dx * dx + dy * dy < R2) cnt++;
        }
      }
    }
    count++;
    const delta = cnt - mean;
    mean += delta / count;               // Welford: single pass, no second loop
    m2 += delta * (cnt - mean);
  }
  const variance = count > 0 ? m2 / count : 0;
  return { speed, clustering: variance / Math.max(mean, 0.01) };
}

function safariTick() {
  if (!run) return;
  run.frames++;
  if (!safariActive || run.frames % 60 !== 0) return;
  const m = computeMetrics();
  run.peakSpeed = Math.max(run.peakSpeed, m.speed);
  run.samples.push(m);
  if (run.samples.length > 200) run.samples.shift();
  updateInstruments(m);
  if (!run.perturbed) checkBounties();
}

function checkBounties() {
  let newly = false;
  for (const b of BOUNTIES) {
    if (progress[b.id]) continue;
    if (b.test()) {
      progress[b.id] = { seed: U.seedName, date: new Date().toISOString().slice(0, 10) };
      newly = true;
    }
  }
  if (newly) { saveProgress(); renderBounties(); }
}

/* ---------- UI ---------- */

const $ = (id) => document.getElementById(id);

function updateInstruments(m) {
  $("instruments").textContent =
    `speed ${m.speed.toFixed(0)} px/s · clustering ${m.clustering.toFixed(1)}` +
    (run.perturbed ? " · perturbed ✋ bounties off" : "");
}

function renderBounties() {
  const ul = $("bounties");
  ul.textContent = "";
  for (const b of BOUNTIES) {
    const li = document.createElement("li");
    const found = progress[b.id];
    if (found) li.className = "found";
    const t = document.createElement("div");
    t.className = "t";
    t.textContent = (found ? "✓ " : "· ") + b.title;
    const d = document.createElement("div");
    d.className = "d";
    d.textContent = found ? `found in ${found.seed} (${found.date})` : b.desc;
    li.appendChild(t); li.appendChild(d);
    ul.appendChild(li);
  }
}

function setSafari(on) {
  safariActive = on;
  $("safari").classList.toggle("open", on);
  $("btnSafari").textContent = on ? "safari ✓" : "safari";
  try { storage && storage.setItem("primordia.safari.active", on ? "1" : ""); }
  catch (e) { /* ignore */ }
  if (on) renderBounties();
}

function describeLaws() {
  return `${U.nSpecies} species · ${U.n} particles · radius ${U.rMax.toFixed(0)}px`;
}

function boot(seedName) {
  U = makeUniverse(seedName);
  run = newRun();
  ctx.fillStyle = "#05070c"; ctx.fillRect(0, 0, W, H);
  $("seedName").textContent = seedName;
  $("laws").textContent = describeLaws();
  $("seedInput").value = seedName;
  $("instruments").textContent = "instruments warming up…";
  history.replaceState(null, "", "#" + encodeURIComponent(seedName));
}

$("btnNew").addEventListener("click", () => boot(randomSeedName()));
$("btnSafari").addEventListener("click", () => setSafari(!safariActive));
$("btnRestart").addEventListener("click", () => boot(U.seedName));
$("btnPause").addEventListener("click", togglePause);
$("btnGo").addEventListener("click", () => {
  const s = $("seedInput").value.trim().toUpperCase();
  if (s) boot(s);
});
$("seedInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("btnGo").click();
  e.stopPropagation();
});
document.querySelector("#hud h1").addEventListener("click", () =>
  $("hud").classList.toggle("min"));

function togglePause() {
  paused = !paused;
  $("btnPause").textContent = paused ? "resume" : "pause";
}

window.addEventListener("keydown", (e) => {
  if (e.key === " ") { e.preventDefault(); togglePause(); }
  if (e.key === "n") boot(randomSeedName());
  if (e.key === "s") setSafari(!safariActive);
});

canvas.addEventListener("pointerdown", (e) => {
  pointer.active = true; pointer.x = e.clientX; pointer.y = e.clientY;
  if (run) run.perturbed = true;   // scientific integrity: touched runs don't score
});
canvas.addEventListener("pointermove", (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY;
});
window.addEventListener("pointerup", () => { pointer.active = false; });

/* ---------- Go ---------- */

const fromUrl = decodeURIComponent(location.hash.slice(1)).trim().toUpperCase();
setSafari(!!(storage && storage.getItem("primordia.safari.active") === "1"));
boot(fromUrl || randomSeedName());
requestAnimationFrame(loop);
</script>
</body>
</html>
